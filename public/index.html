<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Mavin Player</title>
    <meta http-equiv="refresh" content="0; url=/" />
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #0a0a0a;
            color: white;
            font-family: Arial, sans-serif;
        }
        .loader {
            text-align: center;
        }
        .loader .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #333;
            border-top-color: #f59e0b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <h2>?? Mavin Player</h2>
        <p>Loading...</p>
        <p style="font-size: 12px; opacity: 0.5;">Redirecting to app...</p>
    </div>
</body>
</html>
